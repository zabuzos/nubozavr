<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Міні-гра</title>

<style>
body { font-family: Arial; padding:10px; background:#f5f5f5; }
.card { background:white; padding:10px; margin-bottom:10px; border-radius:10px; }
button { padding:6px 10px; margin-top:5px; border:none; border-radius:6px; background:#4CAF50; color:white; cursor:pointer; }
button.minus { background:#f44336; }

.unitCard {
  background:#fafafa;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>

<h2>💰 Баланс: <span id="balance"></span></h2>

<div class="card">
<h3>🏙 Міста</h3>
<div id="cityBlock"></div>
</div>

<div class="card">
<h3>🛒 Купити юнітів</h3>
<div id="shop"></div>
</div>

<div class="card">
<h3>🎒 Армія</h3>
<div id="army"></div>
</div>

<script>
// ---------- Firebase ----------
const firebaseConfig = {
  apiKey: "AIzaSyATVi62zhasVApJzdq-qw_nE4_sms_S6l8",
  authDomain: "nubozavr-cd903.firebaseapp.com",
  projectId: "nubozavr-cd903"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ---------- Дані ----------
let defaultState = {
  balance: 500000,
  cities: [],
  army: {}
};

let units = [
  {name:"Вівцевоз", price:60000, atk:7, def:34, speed:36},
  {name:"Каракалокрад", price:85000, atk:9, def:38, speed:39},
  {name:"Вівці штурмовики", price:75000, atk:6, def:42, speed:24},
  {name:"Капі штурмовики", price:110000, atk:8, def:50, speed:21},
  {name:"Каракали панцергренадири", price:100000, atk:10, def:35, speed:27},
  {name:"КатзеВоз", price:150000, atk:8, def:50, speed:69},
  {name:"Бобер стрілок", price:75000, atk:6, def:42, speed:24},
  {name:"Бобер мінометник", price:120000, atk:12, def:50, speed:18}
];

const allCities = [
  {name:"🏘 Селище", price:30000, income:[5000,10000,15000]},
  {name:"🏙 Місто", price:50000, income:[10000,20000,30000]},
  {name:"🏛 Столиця", price:150000, income:[20000,40000,60000]}
];

let state = null;

// ---------- Firebase sync ----------
function saveGame(){
  db.ref("game/state").set(state);
}

function loadGame(){
  db.ref("game/state").on("value", snap=>{
    if(snap.exists()){
      state = snap.val();
    } else {
      state = JSON.parse(JSON.stringify(defaultState));
      saveGame();
    }

    // FIX
    if(!state.cities) state.cities = [];
    if(!state.army) state.army = {};

    units.forEach(u=>{
      if(state.army[u.name] === undefined){
        state.army[u.name] = 0;
      }
    });

    render();
  });
}

// ---------- UI ----------
function formatMoney(n){ return (n/1000)+"к"; }

function render(){
  document.getElementById("balance").innerText = formatMoney(state.balance);

  // --- Міста ---
  let cityHTML="";
  if(state.cities.length === 0){
    cityHTML = "Немає міст<br><br>";
  }

  state.cities.forEach((c,i)=>{
    let income=c.income[c.level-1];
    cityHTML+=`${c.name} lvl ${c.level} 💰${formatMoney(income)}
    <button onclick="upgradeCity(${i})">↑</button><br>`;
  });

  allCities.forEach((c,i)=>{
    cityHTML+=`${c.name} 💰${formatMoney(c.price)}
    <button onclick="buyCity(${i})">Купити</button><br>`;
  });

  document.getElementById("cityBlock").innerHTML = cityHTML;

  // --- Магазин ---
  let shopHTML="";
  units.forEach(u=>{
    shopHTML+=`
    <div class="unitCard">
      <b>${u.name}</b><br>
      💰 ${formatMoney(u.price)}<br>
      ⚔️ ${u.atk} | 🛡 ${u.def}<br>
      🏃‍♂️ ${u.speed} км/хід<br>
      <button onclick="buy('${u.name}')">Купити</button>
    </div>`;
  });
  document.getElementById("shop").innerHTML = shopHTML;

  // --- Армія ---
  let armyHTML="";
  units.forEach(u=>{
    let count=state.army[u.name]||0;
    armyHTML+=`${u.name}: ${count}
    <button class="minus" onclick="sell('${u.name}')">-</button><br>`;
  });
  document.getElementById("army").innerHTML = armyHTML;

  saveGame();
}

// ---------- Гра ----------
function buy(name){
  let u=units.find(x=>x.name===name);
  if(state.balance>=u.price){
    state.balance-=u.price;
    state.army[name]++;
    render();
  }
}

function sell(name){
  let u=units.find(x=>x.name===name);
  if(state.army[name]>0){
    state.army[name]--;
    state.balance+=u.price*0.5;
    render();
  }
}

function buyCity(i){
  let c=allCities[i];
  if(state.balance>=c.price){
    state.balance-=c.price;
    state.cities.push({name:c.name,level:1,income:c.income});
    render();
  }
}

function upgradeCity(i){
  let c=state.cities[i];
  if(c.level<3 && state.balance>=50000){
    c.level++;
    state.balance-=50000;
    render();
  }
}

// ---------- START ----------
loadGame();
</script>

</body>
</html>
