<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Міні-гра з Firebase</title>
<style>
body { font-family: Arial; padding:10px; background:#f5f5f5; }
.card { background:white; padding:10px; margin-bottom:10px; border-radius:10px; }
button { padding:6px 10px; margin:3px; border-radius:6px; border:none; background:#4CAF50; color:white; cursor:pointer; }
button.minus { background:#f44336; }
.top { font-size:20px; font-weight:bold; }
.unitCard { background:#fafafa; padding:10px; border-radius:8px; margin-bottom:10px; border:1px solid #ddd; }
.tabs button { background:#ddd; color:black; margin-right:5px; }
.activeTab { background:#4CAF50 !important; color:white !important; }
input[type=number], input[type=text]{width:80px;}
.adminUnit { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #ccc; }
.adminUnit .left { display:flex; align-items:center; gap:5px; }
.adminUnit .right { display:flex; align-items:center; gap:5px; }
.adminUnit button { padding:4px 6px; border-radius:5px; border:none; cursor:pointer; }
.adminUnit button:hover { opacity:0.8; }
.adminUnit button.minus { background:#f44336; color:white; }
.adminUnit button.plus { background:#4CAF50; color:white; }
.adminUnit button.edit { background:#2196F3; color:white; }
.adminUnit button.delete { background:#9C27B0; color:white; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>

<div class="tabs">
  <button onclick="switchTab('game')" id="tabGame">🎮 Гра</button>
  <button onclick="switchTab('admin')" id="tabAdmin">👑 Адмін</button>
</div>

<!-- ГРА -->
<div id="gameTab">
<div class="card top">
Баланс: <span id="balance"></span> 💰
</div>

<div class="card">
<h3>🏙 Міста</h3>
<div id="cityBlock"></div>
</div>

<div class="card">
<h3>🛒 Купити юнітів</h3>
<div id="shop"></div>
</div>

<div class="card">
<h3>🎒 Твої юніти</h3>
<div id="army"></div>
</div>

<div class="card">
<button onclick="endTurn()">Закінчити хід</button>
<div id="eventLog"></div>
</div>
</div>

<!-- АДМІН -->
<div id="adminTab" style="display:none;">
<div class="card">
<h3>👑 Адмін панель</h3>
💰 Баланс: 
<button onclick="adminChangeBalance(-1)">-</button>
<input type="number" id="adminBalanceInput" value="50000">
<button onclick="adminChangeBalance(1)">+</button>
<br><br>

🎒 Юніти (кількість):<br>
<div id="adminUnits"></div>
<button onclick="showNewUnitForm()">➕ Новий юніт</button>
<div id="newUnitForm" style="display:none;">
Назва: <input type="text" id="newUnitName"><br>
💰 Ціна: <input type="number" id="newUnitPrice"><br>
⚔️ АТК: <input type="number" id="newUnitAtk"><br>
🛡 ОЗ: <input type="number" id="newUnitDef"><br>
🏃‍♂️ Швидкість: <input type="number" id="newUnitSpeed"><br>
<button onclick="addNewUnit()">Створити</button>
</div>

<br>
<button onclick="saveBaseUnits()">💾 Зберегти базові налаштування</button>
<br><br>
<button onclick="resetGame()">Нова гра</button>
</div>
</div>

<script>
// ---------- Firebase ----------
const firebaseConfig = {
  apiKey: "ТУТ_ВСТАВ_API_KEY",
  authDomain: "ТУТ_ВСТАВ_AuthDomain",
  databaseURL: "https://nubozavr-cd903-default-rtdb.firebaseio.com",
  projectId: "nubozavr-cd903"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const gameRef = db.ref("gameState");

// ---------- Дані ----------
let defaultState = { balance: 500000, cities: [], army: {} };
let defaultUnits = [
  {name:"Вівцевоз", price:60000, atk:7, def:34, speed:12},
  {name:"Каракалокрад", price:85000, atk:9, def:38, speed:13},
  {name:"Вівці штурмовики", price:75000, atk:6, def:42, speed:8},
  {name:"Капі штурмовики", price:110000, atk:8, def:50, speed:7},
  {name:"Каракали панцергренадири", price:100000, atk:10, def:35, speed:9},
  {name:"КатзеВоз", price:150000, atk:8, def:50, speed:23},
  {name:"Бобер стрілок", price:75000, atk:6, def:42, speed:8},
  {name:"Бобер мінометник", price:120000, atk:12, def:50, speed:6}
];
let baseUnits = JSON.parse(JSON.stringify(defaultUnits));
let units = JSON.parse(JSON.stringify(baseUnits));
const allCities = [
  {name:"🏘 Селище", price:30000, income:[5000,10000,15000]},
  {name:"🏙 Місто", price:50000, income:[10000,20000,30000]},
  {name:"🏛 Столиця", price:150000, income:[20000,40000,60000]}
];
let state = null;

// ---------- Завантаження стану ----------
gameRef.on("value", snap => {
  if(snap.exists()){
    state = snap.val();
    // Якщо юніта немає у стані, додати
    units.forEach(u=>{ if(state.army[u.name]===undefined) state.army[u.name]=0; });
  } else {
    state = JSON.parse(JSON.stringify(defaultState));
    units.forEach(u=>state.army[u.name]=0);
    gameRef.set(state);
  }
  render();
});

// ---------- Зберегти стан ----------
function saveGame(){ gameRef.set(state); }

// ---------- UI ----------
function formatMoney(n){ return (n/1000)+"к"; }

function render(){
  if(!state) return;
  document.getElementById("balance").innerText=formatMoney(state.balance);

  // Міста
  let cityHTML = "";
  if(state.cities.length===0) cityHTML="Немає міст<br><br>";
  state.cities.forEach((c,i)=>{
    let income=c.income[c.level-1];
    let stars="🌟".repeat(c.level);
    cityHTML+=`<b>${c.name}</b> ${stars} Рівень: ${c.level} 💰 Дохід: ${formatMoney(income)} / хід
      ${c.level<c.income.length?'<button onclick="upgradeCity('+i+')">Покращити (50к)</button>':''}<br>`;
  });
  cityHTML+="<br><b>Купити нове місто:</b><br>";
  allCities.forEach((c,i)=>{
    cityHTML+=`${c.name} 💰${formatMoney(c.price)} <button onclick="buyCity(${i})">Купити</button><br>`;
  });
  document.getElementById("cityBlock").innerHTML = cityHTML;

  // Магазин юнітів
  let shopHTML = "";
  units.forEach(u=>{
    shopHTML+=`<div class="unitCard"><b>${u.name}</b><br>
      💰 ${formatMoney(u.price)}<br>
      ⚔️ ${u.atk} | 🛡 ${u.def} | 🏃‍♂️ ${u.speed} км/хід<br>
      <button onclick="buy('${u.name}')">Купити</button></div>`;
  });
  document.getElementById("shop").innerHTML = shopHTML;

  // Армія
  let armyHTML = "";
  units.forEach(u=>{
    armyHTML+=`${u.name}: ${state.army[u.name]} <button class="minus" onclick="sell('${u.name}')">-</button><br>`;
  });
  document.getElementById("army").innerHTML = armyHTML;

  // Адмін
  let adminHTML = "";
  units.forEach(u=>{
    adminHTML+=`<div class="adminUnit">
      <div class="left">
        <button class="plus" onclick="adminAddUnit('${u.name}',1)">➕</button>
        <button class="minus" onclick="adminAddUnit('${u.name}',-1)">−</button>
        ${u.name} (${state.army[u.name]}) ⚔️${u.atk} 🛡${u.def} 🏃‍♂️${u.speed} км/хід
      </div>
      <div class="right">
        <button class="edit" onclick="editUnitPrompt('${u.name}')">✏️</button>
        <button class="delete" onclick="deleteUnit('${u.name}')">🗑️</button>
      </div>
    </div>`;
  });
  document.getElementById("adminUnits").innerHTML = adminHTML;
}

// ---------- Гра ----------
function buy(name){
  let u = units.find(x=>x.name===name);
  if(state.balance>=u.price){ state.balance-=u.price; state.army[name]++; saveGame(); render(); }
  else alert("Не вистачає грошей");
}
function sell(name){
  let u = units.find(x=>x.name===name);
  if(state.army[name]>0){ state.army[name]--; state.balance+=u.price*0.5; saveGame(); render(); }
}
function buyCity(i){
  let c=allCities[i];
  if(state.balance>=c.price){ state.balance-=c.price; state.cities.push({name:c.name, level:1, income:c.income}); saveGame(); render(); }
  else alert("Не вистачає грошей");
}
function upgradeCity(i){
  let c=state.cities[i];
  if(c.level<c.income.length && state.balance>=50000){ state.balance-=50000; c.level++; saveGame(); render(); }
  else alert("Не вистачає грошей");
}
function endTurn(){
  let log="";
  state.cities.forEach(c=>{ let income=c.income[c.level-1]; state.balance+=income; log+="💰 Дохід +" + formatMoney(income) + "<br>"; });
  document.getElementById("eventLog").innerHTML = log;
  saveGame(); render();
}

// ---------- Адмін ----------
function adminChangeBalance(dir){
  let val = parseInt(document.getElementById("adminBalanceInput").value)||0;
  state.balance += val*dir;
  saveGame(); render();
}
function adminAddUnit(name, delta){ state.army[name] = (state.army[name]||0)+delta; if(state.army[name]<0) state.army[name]=0; saveGame(); render(); }
function editUnitPrompt(name){ let u=units.find(x=>x.name===name); let newName=prompt("Назва:",u.name); if(newName) u.name=newName; render(); }
function deleteUnit(name){ if(confirm("Видалити "+name+"?")){ units=units.filter(u=>u.name!==name); delete state.army[name]; saveGame(); render(); } }
function showNewUnitForm(){ document.getElementById("newUnitForm").style.display='block'; }
function addNewUnit(){ let name=document.getElementById("newUnitName").value; if(!name) return; let price=parseInt(document.getElementById("newUnitPrice").value)||0; let atk=parseInt(document.getElementById("newUnitAtk").value)||0; let def=parseInt(document.getElementById("newUnitDef").value)||0; let speed=parseInt(document.getElementById("newUnitSpeed").value)||0; units.push({name,price,atk,def,speed}); state.army[name]=0; document.getElementById("newUnitForm").style.display='none'; saveGame(); render(); }
function saveBaseUnits(){ baseUnits=JSON.parse(JSON.stringify(units)); alert("Базові юніти збережено!"); }
function resetGame(){ if(confirm("Нова гра?")){ state=JSON.parse(JSON.stringify(defaultState)); units=JSON.parse(JSON.stringify(baseUnits)); units.forEach(u=>state.army[u.name]=0); saveGame(); render(); } }

// ---------- Таби ----------
function switchTab(tab){
  document.getElementById("gameTab").style.display=tab==="game"?"block":"none";
  document.getElementById("adminTab").style.display=tab==="admin"?"block":"none";
  document.getElementById("tabGame").classList.toggle("activeTab",tab==="game");
  document.getElementById("tabAdmin").classList.toggle("activeTab",tab==="admin");
}

switchTab("game");
</script>
</body>
</html>
